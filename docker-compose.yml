version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: g-scores-backend
    ports:
      - "5000:5000"
    volumes:
      - ./dataset:/app/dataset
      - ./backend/prisma:/app/prisma
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - PORT=5000
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: g-scores-frontend
    ports:
      - "3000:80"
    restart: always
    depends_on:
      - backend
